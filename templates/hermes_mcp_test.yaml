# Hermes MCP 工具连通性验证工作流 — H2
# 最小工作流：挂载 SROS MCP Gateway 并验证工具发现
name: "Hermes_MCP_Connectivity_Test"
description: "验证 Hermes 对 SROS MCP Gateway 的工具挂载与调用能力 (H2 milestone)"
version: "1.0"

agents:
  - name: MCP_Tester
    role: "MCP 验证者 — 测试 SROS MCP 工具发现与基础调用"
    model: claude-sonnet-4-6
    tools:
      - sros-db-query
      - sros-hpc-status
      - sros-scholar-search
    state:
      persist: false
      ttl_days: 1

workflow:
  type: sequential
  global_timeout_hours: 1

  steps:
    - id: step1_mcp_discovery
      agent: MCP_Tester
      task: >
        验证 SROS MCP Gateway 工具发现：
        1. 连接 MCP SSE endpoint (http://localhost:8000/sse)
        2. 列举所有可用工具
        3. 确认以下工具在清单中：
           - sros-db-query (DuckDB 结构化查询)
           - sros-hpc-status (Slurm 作业状态查询)
           - sros-scholar-search (跨数据库文献搜索)
        4. 如所有工具可见，生成 discovery_ok.md
      timeout_hours: 0.1

    - id: step2_db_query_smoke
      agent: MCP_Tester
      depends_on: [step1_mcp_discovery]
      task: >
        执行最小 DuckDB 查询烟测：
        1. 调用 sros-db-query，执行: SELECT 1 AS connectivity_test
        2. 验证返回结果格式正确（JSON 包含 connectivity_test=1）
        3. 如成功，生成 query_smoke_ok.md
        4. 如 SROS 不在线，标注为 MOCK_MODE，不阻塞流程
      timeout_hours: 0.1

    - id: step3_result_summary
      agent: MCP_Tester
      depends_on: [step2_db_query_smoke]
      task: >
        汇总 MCP 验证结果：
        1. 工具发现数量与状态
        2. DuckDB 烟测结果
        3. 整体 MCP Gateway 健康评分
        4. 生成 mcp_test_report.md
      timeout_hours: 0.1
